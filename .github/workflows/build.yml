name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (overrides push tag)"
        required: false
        default: ""

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Windows executable
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o vpc-score-agent.exe \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpc-score-agent-windows
          path: vpc-score-agent.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release tag
        id: tagger
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF##*/}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          else
            echo "tag=unreleased-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vpc-score-agent-windows
          path: artifact/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagger.outputs.tag }}
          name: Release ${{ steps.tagger.outputs.tag }}
          body: |
            Auto-generated release for ${{ steps.tagger.outputs.tag }}
            See CHANGELOG.md for details.
          files: artifact/vpc-score-agent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
